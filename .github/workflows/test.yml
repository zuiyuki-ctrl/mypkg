name: Test system_monitor package

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros-distro: humble
            ubuntu: ubuntu-22.04
          - ros-distro: iron
            ubuntu: ubuntu-22.04
          - ros-distro: jazzy
            ubuntu: ubuntu-24.04

    runs-on: ${{ matrix.ubuntu }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up ROS 2 GPG key
      run: |
        sudo apt-get update
        sudo apt-get install -y curl gnupg2 lsb-release
        sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=$(dpkg --print-architecture)] http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" > /etc/apt/sources.list.d/ros2-latest.list'
        sudo apt-get update

    - name: Install ROS 2 ${{ matrix.ros-distro }}
      run: |
        sudo apt-get install -y ros-${{ matrix.ros-distro }}-desktop
        sudo apt-get install -y python3-colcon-common-extensions
        echo "source /opt/ros/${{ matrix.ros-distro }}/setup.bash" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get install -y python3-psutil

    - name: Build package
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        cd ${{ github.workspace }}
        colcon build --packages-select system_monitor

    - name: Test package
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        source ${{ github.workspace }}/install/setup.bash
        colcon test --packages-select system_monitor

    - name: Check test results
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        colcon test-result --verbose

