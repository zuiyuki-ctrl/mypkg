name: Test system_monitor package

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros-distro: humble
            ubuntu: ubuntu-22.04
          - ros-distro: iron
            ubuntu: ubuntu-22.04
          - ros-distro: jazzy
            ubuntu: ubuntu-24.04

    runs-on: ${{ matrix.ubuntu }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ROS 2 ${{ matrix.ros-distro }}
      uses: ros-tooling/setup-ros@v0.6
      with:
        required-ros-distributions: ${{ matrix.ros-distro }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-psutil \
          python3-colcon-common-extensions

    - name: Build package
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        cd ${{ github.workspace }}
        colcon build --packages-select system_monitor

    - name: Test package
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        source ${{ github.workspace }}/install/setup.bash
        colcon test --packages-select system_monitor

    - name: Check test results
      shell: bash
      run: |
        source /opt/ros/${{ matrix.ros-distro }}/setup.bash
        colcon test-result --verbose

